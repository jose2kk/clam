name: Bug Report
description: Report a bug in clam
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: clam version
      description: Output of `clam --version`
      placeholder: "clam 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `clam add test`
        2. Run `clam use test`
        3. ...
    validations:
      required: true
